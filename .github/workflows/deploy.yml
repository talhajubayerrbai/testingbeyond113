name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi uvicorn gunicorn httpx pytest pytest-asyncio
          fi

      - name: Lint (advisory only)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 || true
        continue-on-error: true

      - name: Run tests
        run: |
          if [ -d tests ] && find tests -name "*.py" | grep -q .; then
            pytest tests/ -v
          else
            echo "No tests found - skipping"
          fi

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      #  Checkout 
      - name: Checkout
        uses: actions/checkout@v4

      #  AWS credentials 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #  Terraform: provision EC2 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Get EC2 public IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "SERVER_IP=${SERVER_IP}" >> "$GITHUB_OUTPUT"

      #  Write SSH private key 
      - name: Prepare SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      #  Wait for SSH to become available 
      - name: Wait for SSH
        run: |
          SERVER_IP="${{ steps.get_ip.outputs.SERVER_IP }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -o BatchMode=yes \
                   -i /tmp/deploy_key \
                   ec2-user@${SERVER_IP} "echo ok" 2>/dev/null; then
              echo "SSH is ready."
              break
            fi
            echo "Attempt ${i}/30 - waiting 10s..."
            sleep 10
          done

      #  Install Ansible 
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      #  Run Ansible playbook 
      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ steps.get_ip.outputs.SERVER_IP }}"
          ansible-playbook ansible/playbook.yml \
            -i "${SERVER_IP}," \
            --private-key /tmp/deploy_key \
            -u ec2-user \
            -e "app_src=${{ github.workspace }}"

      #  Health check 
      - name: Health check
        run: |
          SERVER_IP="${{ steps.get_ip.outputs.SERVER_IP }}"
          echo "Checking http://${SERVER_IP}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "http://${SERVER_IP}/health" || echo "000")
            echo "Attempt ${i}/12 - HTTP ${STATUS}"
            if echo "${STATUS}" | grep -qE "^[23]"; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check FAILED after 12 attempts."
          exit 1

      #  Cleanup temp key 
      - name: Cleanup
        if: always()
        run: rm -f /tmp/deploy_key
