---
- name: Configure and deploy FastAPI app
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: appuser
    app_src: "{{ app_src }}"

  tasks:

    #  System packages 
    - name: Install system dependencies
      ansible.builtin.dnf:
        name:
          - python3.11
          - python3.11-pip
          - python3.11-devel
          - nginx
          - rsync
          - gcc
          - git
        state: present
        update_cache: true

    #  App user 
    - name: Create app user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /sbin/nologin
        home: "{{ app_dir }}"
        create_home: false

    #  App directory 
    - name: Create /opt/app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    #  Sync app code 
    - name: Sync application code to /opt/app
      ansible.builtin.synchronize:
        src: "{{ app_src }}/"
        dest: "{{ app_dir }}/"
        delete: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.github"
          - "--exclude=terraform"
          - "--exclude=ansible"
          - "--exclude=.venv"
          - "--exclude=node_modules"

    - name: Set ownership on app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    #  Python virtualenv + dependencies 
    - name: Create Python 3.11 virtual environment
      ansible.builtin.command:
        cmd: python3.11 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/activate"

    - name: Upgrade pip inside venv
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install --upgrade pip"

    - name: Install Python dependencies from requirements.txt (if present)
      ansible.builtin.stat:
        path: "{{ app_dir }}/requirements.txt"
      register: req_file

    - name: pip install from requirements.txt
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      when: req_file.stat.exists

    - name: Install core packages if no requirements.txt
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install fastapi uvicorn[standard] gunicorn httpx"
      when: not req_file.stat.exists

    - name: Set venv ownership
      ansible.builtin.file:
        path: "{{ venv_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    #  Systemd service 
    - name: Write systemd service unit
      ansible.builtin.shell: |
        cat > /etc/systemd/system/fastapi.service << 'EOF'
        [Unit]
        Description=FastAPI application (gunicorn + uvicorn)
        After=network.target

        [Service]
        Type=notify
        User={{ app_user }}
        Group={{ app_user }}
        WorkingDirectory={{ app_dir }}
        ExecStart={{ venv_dir }}/bin/gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000
        Restart=on-failure
        RestartSec=5
        StandardOutput=journal
        StandardError=journal
        SyslogIdentifier=fastapi
        Environment=PYTHONUNBUFFERED=1
        Environment=APP_ENV=production

        [Install]
        WantedBy=multi-user.target
        EOF

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and restart fastapi service
      ansible.builtin.systemd:
        name: fastapi
        enabled: true
        state: restarted

    #  Nginx configuration 
    - name: Write nginx site configuration
      ansible.builtin.shell: |
        cat > /etc/nginx/conf.d/fastapi.conf << 'EOF'
        server {
            listen 80 default_server;
            listen [::]:80 default_server;

            server_name _;

            location / {
                proxy_pass         http://127.0.0.1:8000;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_read_timeout 60s;
                proxy_connect_timeout 10s;
            }
        }
        EOF

    - name: Remove default nginx config if present
      ansible.builtin.file:
        path: /etc/nginx/conf.d/default.conf
        state: absent

    - name: Enable and restart nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    #  Verify gunicorn is listening 
    - name: Wait for gunicorn to bind on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        timeout: 60
        state: started